
name: "Build pages"

on:
  push:
    branches:
      - main

env:
  RUBY_VERSION: 3.0.2

jobs:
  pages:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: Cache vendro
        id: cache-vendor
        uses: actions/cache@v2
        with:
          path: vendor
          key: ${{ runner.os }}-vendor

      - name: "Bundle install"
        run: |
          bundle install

      - name: "Yarn install"
        run: |
          yarn install
          yarn webpack --mode production

      - name: "Build site"
        run: |
          bundle exec bridgetown build --base_path foto --url https://foto.mariochavez.io
          mv output public

      - name: Archive site artifacts
        uses: actions/upload-artifact@v2
        with:
          name: site
          path: public
