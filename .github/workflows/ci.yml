
name: "Build pages"

on:
  push:
    branches:
      - main

env:
  RUBY_VERSION: 3.0.2

jobs:
  pages:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Cache vendor
        id: cache-vendor
        uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{env.RUBY_VERSION}}
          bundler-cache: true
          cache-version: 1

      - name: "Bundle install"
        run: |
          bundle install --jobs 4 --retry 3

      - name: "Yarn install"
        run: |
          yarn install
          yarn webpack --mode production

      - name: "Build site"
        run: |
          bundle exec bridgetown build --base_path foto --url https://foto.mariochavez.io

      - name: Deploy to GitHub Pages
        if: success()
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: gh-pages
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive site artifacts
        uses: actions/upload-artifact@v2
        with:
          name: site
          path: output
